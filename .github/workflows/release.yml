name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Extract version
        id: version
        run: echo "version=$(cat zsmith/src/main/resources/version.txt)" >> "$GITHUB_OUTPUT"

      - name: Fetch zb
        run: curl -fL -o zb.jar https://github.com/AdamBien/zb/releases/latest/download/zb.jar

      - name: Build
        working-directory: zsmith
        run: java -jar ../zb.jar

      - name: Rename artifact
        run: cp zsmith/zbo/zsmith.jar zsmith-${{ steps.version.outputs.version }}.jar

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}.${{ github.run_number }}
          name: zsmith ${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          files: zsmith-${{ steps.version.outputs.version }}.jar
          generate_release_notes: true
